name: Scheduled Cron Jobs

on:
  schedule:
    # 정보 수집 - 07:00 KST (22:00 UTC)
    - cron: "0 22 * * *"
    # 정보 수집 - 12:30 KST (03:30 UTC)
    - cron: "30 3 * * *"
    # FDA 체크 - 00:30 KST (15:30 UTC)
    - cron: "30 15 * * *"
    # FDA 체크 - 07:30 KST (22:30 UTC)
    - cron: "30 22 * * *"
    # FDA 체크 - 14:30 KST (05:30 UTC)
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "실행할 job (collect / fda-check / both)"
        required: false
        default: "both"

jobs:
  collect:
    name: 정보 수집
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 22 * * *' ||
      github.event.schedule == '30 3 * * *' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Call collect API
        run: |
          echo "Calling collect API..."
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300 \
            "https://stock-insight-agent.vercel.app/api/cron/collect")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            exit 1
          fi

  fda-check:
    name: HLB FDA 체크
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 15 * * *' ||
      github.event.schedule == '30 22 * * *' ||
      github.event.schedule == '30 5 * * *' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Call FDA check API
        run: |
          echo "Calling FDA check API..."
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300 \
            "https://stock-insight-agent.vercel.app/api/cron/fda-check")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            exit 1
          fi
